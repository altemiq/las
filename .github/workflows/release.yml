name: release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: The version to release
        required: true

jobs:
  promote-nuget:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_MULTILEVEL_LOOKUP: false

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - uses: NuGet/login@v1
        id: login
        with:
          user: ${{ github.actor }}

      - name: promote nuget
        run: |
          packages=("Altemiq.IO.Las" \
            "Altemiq.IO.Las.Compression" \
            "Altemiq.IO.Las.Geodesy" \
            "Altemiq.IO.Las.Indexing" \
            "Altemiq.IO.Las.Tiling" \
            "Altemiq.IO.Las.Http" \
            "Altemiq.IO.Las.S3" \
            "Altemiq.IO.Las.Azure" \
            "Altemiq.IO.Las.Cloud" \
            "Altemiq.IO.Las.Arrow" \
            "Altemiq.IO.Las.Compression.Arrow" \
            "Altemiq.IO.Las.DataFrame" \
            "Altemiq.IO.Las.Compression.DataFrame")

          for package in "${packages[@]}"; do
            dotnet dnx ${{ github.repository_owner }}.nuget.promote -- source $package --source https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --version ${{ inputs.version }}
          done

  promote-docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: promote docker container
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          repository_name=ghcr.io/${{ github.repository_owner }}/io/las
          pre_release_version=${{ inputs.version }}
          pre_release_image_name=$repository_name:$pre_release_version
          docker pull $pre_release_image_name

          # strip off the pre-release
          release_version=${pre_release_version%%'-'*}
          docker image tag $pre_release_image_name $repository_name:$release_version

          # strip off the patch version
          release_version=${release_version%'.'*}
          docker image tag $pre_release_image_name $repository_name:$release_version

          # strip off the minor version
          release_version=${release_version%'.'*}
          docker image tag $pre_release_image_name $repository_name:$release_version

          # use the 'latest' tag
          docker image tag $pre_release_image_name $repository_name:latest

          docker image push --all-tags $repository_name

  create-release:
    runs-on: ubuntu-latest
    needs: [promote-nuget, promote-docker]

    steps:
      - id: get-version
        run: |
          pre_release_version=${{ inputs.version }}
          release_version=${pre_release_version%%'-'*}
          
          if [[ $pre_release_version == *-*.* ]]; then
            part_after_dash=${pre_release_version#*-}
            if [[ $part_after_dash == *.* ]]; then
              pre_release_version=${pre_release_version%.*}
            fi
          fi

          echo $pre_release_version
          echo "tag_version=$pre_release_version" >> $GITHUB_OUTPUT

          echo $release_version
          echo "release_version=$release_version" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          ref: v${{ steps.get-version.outputs.tag_version }}

      - name: Create Release
        uses: altemiq/update-existing-release@v1
        with:
          release: v${{ steps.get-version.outputs.release_version }}
          tag: v${{ steps.get-version.outputs.release_version }}
          prerelease: false
